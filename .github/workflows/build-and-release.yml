name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            cpu: x64
          - os: macos-latest
            platform: macos
            cpu: x64
          - os: ubuntu-latest
            platform: linux
            cpu: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev libfontconfig1-dev

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          # No extra dependencies usually needed for macOS a-latest
          # but we ensure we use a stable SDK
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: Get Skia URL
        id: skia_url
        shell: bash
        run: |
          # We use the provided helper script to get the URL
          SKIA_URL=$(bash laf/misc/skia-url.sh release ${{ matrix.platform }} ${{ matrix.cpu }})
          echo "url=$SKIA_URL" >> $GITHUB_OUTPUT
          echo "file=$(basename $SKIA_URL)" >> $GITHUB_OUTPUT

      - name: Download and extract Skia
        shell: bash
        run: |
          mkdir -p skia
          curl -L -o skia/${{ steps.skia_url.outputs.file }} ${{ steps.skia_url.outputs.url }}
          unzip -o skia/${{ steps.skia_url.outputs.file }} -d skia

      - name: Configure CMake
        shell: bash
        run: |
          # On Windows, we need to locate where Skia library is specifically
          if [ "${{ matrix.platform }}" == "windows" ]; then
            SKIA_LIB_FILE="skia.lib"
            COMPILER_FLAGS="-DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl"
          else
            SKIA_LIB_FILE="libskia.a"
            COMPILER_FLAGS=""
          fi
          
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$(pwd)/skia \
            -DSKIA_LIBRARY_DIR=$(pwd)/skia/out/Release-${{ matrix.cpu }} \
            -DSKIA_LIBRARY=$(pwd)/skia/out/Release-${{ matrix.cpu }}/$SKIA_LIB_FILE \
            $COMPILER_FLAGS \
            ${{ matrix.platform == 'macos' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0' || '' }}

      - name: Build
        run: cmake --build build --target aseprite

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p release
          cp build/bin/aseprite.exe release/
          cp -r data release/
          # Copy DLLs if any were found in build/bin
          find build/bin -name "*.dll" -exec cp {} release/ \;
          7z a aseprite-windows.zip ./release/*

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p release
          cp build/bin/aseprite release/
          cp -r data release/
          tar -czvf aseprite-linux.tar.gz -C release .

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          # On macOS, it creates Aseprite.app in build/bin
          mkdir -p release
          cp -r build/bin/Aseprite.app release/
          # Zip the .app bundle
          zip -r aseprite-macos.zip release/Aseprite.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-${{ matrix.platform }}
          path: |
            aseprite-windows.zip
            aseprite-linux.tar.gz
            aseprite-macos.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aseprite-windows/aseprite-windows.zip
            aseprite-linux/aseprite-linux.tar.gz
            aseprite-macos/aseprite-macos.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
